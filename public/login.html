<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in - Uptime Monitor</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container narrow" style="padding-top: 64px;">
    <h1>Welcome back</h1>
    <p class="muted">Log in to your uptime dashboard.</p>

    <div class="card">
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" required />

        <label for="password">Password</label>
        <input type="password" id="password" required />

        <div class="error" id="error"></div>

        <button type="submit" style="width: 100%; margin-top: 12px;">Log in</button>
      </form>
    </div>

    <p class="muted small">No account yet? <a href="/register.html">Create one</a></p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      try {
        await api('/api/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        // Logged in - the session cookie is set, so just go to the dashboard.
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
