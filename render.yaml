# Render Blueprint - lets Render configure this app automatically.
# In Render: "New +" > "Blueprint" > pick this repo, and it reads this file.
services:
  - type: web
    name: uptime-monitor
    runtime: node
    plan: free
    region: virginia       # same region as the Neon DB (US East) -> low latency
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false          # you paste your Neon connection string in the dashboard
      - key: PGSSL
        value: "true"        # Neon (and most cloud Postgres) require SSL
      - key: SESSION_SECRET
        generateValue: true  # Render generates a random secret for you
